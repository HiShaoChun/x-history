<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据检查工具</title>
  <style>
    :root {
      --glass-bg: rgba(255, 255, 255, 0.16);
      --glass-inner: rgba(255, 255, 255, 0.2);
      --glass-border: rgba(255, 255, 255, 0.6);
      --glass-shadow: 0 8px 30px rgba(31, 38, 135, 0.18);
      --glass-inset: inset 0 1px 1px rgba(255, 255, 255, 0.7);
      --blur: blur(24px) saturate(185%);
      --text-primary: #1c1c1e;
      --text-secondary: rgba(60, 60, 67, 0.62);
      --accent: #007aff;
      --green: #34c759;
      --red: #ff3b30;
      --amber: #ff9500;
    }

    * { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      color: var(--text-primary);
      padding: 32px 20px;
      max-width: 800px;
      margin: 0 auto;
      min-height: 100vh;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background: linear-gradient(135deg,
        #ff9a9e 0%, #fecfef 22%, #a18cd1 48%, #84fab0 74%, #8fd3f4 100%);
    }

    h1 {
      color: var(--text-primary);
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 24px;
      text-shadow: 0 1px 2px rgba(255, 255, 255, 0.5);
    }

    h2 {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.01em;
    }

    .section {
      background: var(--glass-bg);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border: 1px solid var(--glass-border);
      border-radius: 22px;
      box-shadow: var(--glass-shadow), var(--glass-inset);
      padding: 20px 22px;
      margin-bottom: 18px;
    }

    .status { font-size: 16px; margin: 10px 0; }
    .success { color: var(--green); font-weight: 600; }
    .error { color: var(--red); font-weight: 600; }
    .warning { color: var(--amber); font-weight: 600; }

    button {
      background: rgba(0, 122, 255, 0.82);
      backdrop-filter: blur(12px) saturate(160%);
      -webkit-backdrop-filter: blur(12px) saturate(160%);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.4);
      padding: 11px 22px;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin: 5px;
      box-shadow: 0 6px 20px rgba(0, 122, 255, 0.32), inset 0 1px 1px rgba(255, 255, 255, 0.5);
      transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
      background: rgba(0, 122, 255, 0.95);
      transform: translateY(-2px);
      box-shadow: 0 10px 26px rgba(0, 122, 255, 0.4), inset 0 1px 1px rgba(255, 255, 255, 0.5);
    }

    button:active { transform: translateY(0); }

    pre {
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.55);
      color: var(--text-primary);
      padding: 12px;
      border-radius: 12px;
      overflow-x: auto;
      font-size: 12px;
    }

    .record {
      background: var(--glass-inner);
      border: 1px solid rgba(255, 255, 255, 0.55);
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.6);
      padding: 13px 15px;
      margin: 8px 0;
      border-radius: 14px;
      font-size: 14px;
    }

    a { color: var(--accent); font-weight: 600; }

    @media (prefers-reduced-motion: reduce) {
      button { transition: none; }
    }
  </style>
</head>
<body>
  <h1>🔍 X History 数据检查工具</h1>

  <div class="section">
    <h2>1. 数据库状态</h2>
    <div id="dbStatus" class="status">检查中...</div>
  </div>

  <div class="section">
    <h2>2. 记录统计</h2>
    <div id="stats" class="status">检查中...</div>
  </div>

  <div class="section">
    <h2>3. 最近记录（最多显示 5 条）</h2>
    <div id="recentRecords">检查中...</div>
  </div>

  <div class="section">
    <h2>4. 扩展状态检查</h2>
    <div id="extensionStatus" class="status">检查中...</div>
  </div>

  <div class="section">
    <h2>操作</h2>
    <button onclick="checkAll()">重新检查</button>
    <button onclick="openXCom()">打开 x.com</button>
    <button onclick="viewHistory()">查看完整历史</button>
  </div>

  <script src="db.js"></script>
  <script>
    let db = null;

    async function checkDatabase() {
      const statusEl = document.getElementById('dbStatus');
      try {
        db = new TweetDatabase();
        await db.init();
        statusEl.innerHTML = '<span class="success">✓ 数据库连接成功</span>';
        return true;
      } catch (error) {
        statusEl.innerHTML = `<span class="error">✗ 数据库连接失败: ${error.message}</span>`;
        return false;
      }
    }

    async function checkStats() {
      const statsEl = document.getElementById('stats');
      if (!db) {
        statsEl.innerHTML = '<span class="error">数据库未初始化</span>';
        return;
      }

      try {
        const tweets = await db.getAllTweets();
        const totalCount = tweets.length;
        const openedCount = tweets.filter(t => t.opened).length;
        const totalDwellMs = tweets.reduce((sum, t) => sum + (t.dwellMs || 0), 0);
        const totalMinutes = Math.round(totalDwellMs / 60000);

        if (totalCount === 0) {
          statsEl.innerHTML = `
            <span class="warning">⚠ 暂无记录</span><br>
            <small>请确保：<br>
            1. 已访问 x.com 或 twitter.com<br>
            2. 在推文上停留了至少 1.5 秒<br>
            3. 页面保持焦点（未切换标签页）
            </small>
          `;
        } else {
          statsEl.innerHTML = `
            <span class="success">✓ 找到 ${totalCount} 条记录</span><br>
            已点开: ${openedCount} 条<br>
            总停留时间: ${totalMinutes} 分钟
          `;
        }

        return tweets;
      } catch (error) {
        statsEl.innerHTML = `<span class="error">✗ 查询失败: ${error.message}</span>`;
        return [];
      }
    }

    async function checkRecentRecords() {
      const recordsEl = document.getElementById('recentRecords');
      if (!db) {
        recordsEl.innerHTML = '<span class="error">数据库未初始化</span>';
        return;
      }

      try {
        const tweets = await db.getAllTweets();

        if (tweets.length === 0) {
          recordsEl.innerHTML = '<span class="warning">暂无记录</span>';
          return;
        }

        // 按 lastSeenAt 排序，取最近 5 条
        const recent = tweets
          .sort((a, b) => b.lastSeenAt - a.lastSeenAt)
          .slice(0, 5);

        let html = '';
        recent.forEach((tweet, index) => {
          const date = new Date(tweet.firstSeenAt);
          const timeStr = date.toLocaleString('zh-CN');
          const dwellSec = Math.round(tweet.dwellMs / 1000);

          html += `
            <div class="record">
              <strong>#${index + 1}</strong>
              ${tweet.author || '未知作者'}
              ${tweet.opened ? '<span class="success">↗已点开</span>' : ''}
              <br>
              <small>时间: ${timeStr} | 停留: ${dwellSec}秒 | 次数: ${tweet.viewCount || 1}</small>
              <br>
              <small>${tweet.text ? tweet.text.substring(0, 100) : '(无文本)'}</small>
              ${tweet.url ? `<br><a href="${tweet.url}" target="_blank">查看原推</a>` : ''}
            </div>
          `;
        });

        recordsEl.innerHTML = html;
      } catch (error) {
        recordsEl.innerHTML = `<span class="error">✗ 查询失败: ${error.message}</span>`;
      }
    }

    async function checkExtensionStatus() {
      const statusEl = document.getElementById('extensionStatus');
      let html = '';

      // 检查是否在扩展环境中
      if (typeof chrome !== 'undefined' && chrome.runtime) {
        html += '<span class="success">✓ Chrome 扩展 API 可用</span><br>';

        // 尝试获取扩展信息
        try {
          const manifest = chrome.runtime.getManifest();
          html += `<small>扩展版本: ${manifest.version}</small><br>`;
        } catch (e) {
          html += '<small>无法获取扩展版本</small><br>';
        }
      } else {
        html += '<span class="warning">⚠ 不在扩展环境中（正常，这是独立页面）</span><br>';
      }

      statusEl.innerHTML = html;
    }

    async function checkAll() {
      await checkDatabase();
      await checkStats();
      await checkRecentRecords();
      await checkExtensionStatus();
    }

    function openXCom() {
      window.open('https://x.com', '_blank');
    }

    function viewHistory() {
      if (typeof chrome !== 'undefined' && chrome.runtime) {
        chrome.tabs.create({ url: chrome.runtime.getURL('viewer.html') });
      } else {
        window.open('viewer.html', '_blank');
      }
    }

    // 页面加载时自动检查
    window.addEventListener('load', checkAll);
  </script>
</body>
</html>
