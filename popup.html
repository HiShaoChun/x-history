<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X History</title>
  <style>
    :root {
      --glass-bg: rgba(255, 255, 255, 0.35);
      --glass-bg-strong: rgba(255, 255, 255, 0.55);
      --glass-border: rgba(255, 255, 255, 0.8);
      --glass-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
      --glass-inset: inset 0 1px 1px rgba(255, 255, 255, 0.9);
      --blur: blur(24px) saturate(150%);
      --text-primary: #1c1c1e;
      --text-secondary: rgba(60, 60, 67, 0.6);
      --accent: #1c1c1e;
      --radius-lg: 22px;
      --radius-md: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      width: 400px;
      max-height: 600px;
      padding: 18px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      color: var(--text-primary);
      margin: 0;
      overflow-y: auto;
      position: relative;
    }

    /* 纯白中性背景层 */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background: linear-gradient(135deg, #eef1f5 0%, #dfe3ea 45%, #e9ecf1 100%);
    }

    h2 {
      font-size: 19px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 2px 0 16px 2px;
      color: var(--text-primary);
    }

    .stats {
      background: var(--glass-bg);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      box-shadow: var(--glass-shadow), var(--glass-inset);
      padding: 16px;
      margin-bottom: 16px;
    }

    .stat-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .stat-item:last-child {
      margin-bottom: 0;
    }

    .stat-label {
      color: var(--text-secondary);
    }

    .stat-value {
      font-weight: 700;
      color: var(--accent);
    }

    .recent-tweets {
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      margin: 0 0 10px 2px;
      letter-spacing: -0.01em;
    }

    .tweet-item {
      background: var(--glass-bg);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      box-shadow: var(--glass-shadow), var(--glass-inset);
      padding: 12px 13px;
      margin-bottom: 9px;
      font-size: 13px;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
    }

    .tweet-item:hover {
      background: var(--glass-bg-strong);
      transform: translateY(-2px);
      box-shadow: 0 12px 34px rgba(0, 0, 0, 0.12), var(--glass-inset);
    }

    .tweet-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      font-size: 12px;
    }

    .tweet-time {
      color: var(--text-secondary);
    }

    .tweet-author {
      color: var(--text-primary);
      font-weight: 700;
    }

    .tweet-opened {
      color: var(--text-secondary);
      font-size: 11px;
      font-weight: 600;
    }

    .tweet-dwell {
      color: var(--text-secondary);
      font-size: 11px;
    }

    .tweet-text {
      color: var(--text-primary);
      line-height: 1.45;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    button {
      width: 100%;
      background: var(--glass-bg-strong);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      color: var(--text-primary);
      border: 1px solid var(--glass-border);
      padding: 12px;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: var(--glass-shadow), var(--glass-inset);
      transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.75);
      transform: translateY(-2px);
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.12), var(--glass-inset);
    }

    button:active {
      transform: translateY(0);
    }

    .loading {
      text-align: center;
      color: var(--text-secondary);
      padding: 20px 0;
    }

    .empty {
      text-align: center;
      color: var(--text-secondary);
      padding: 10px;
      font-size: 13px;
    }

    /* 半透明滚动条 */
    body::-webkit-scrollbar {
      width: 8px;
    }
    body::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.15);
      border-radius: 8px;
    }
    body::-webkit-scrollbar-track {
      background: transparent;
    }

    @media (prefers-reduced-motion: reduce) {
      .tweet-item, button { transition: none; }
    }
  </style>
</head>
<body>
  <h2>📖 X History</h2>

  <div class="stats" id="stats">
    <div class="loading">加载中...</div>
  </div>

  <div class="recent-tweets">
    <div class="section-title">最近浏览</div>
    <div id="recentList">
      <div class="loading">加载中...</div>
    </div>
  </div>

  <button id="viewHistoryBtn">查看完整历史</button>

  <script src="popup.js"></script>
</body>
</html>
